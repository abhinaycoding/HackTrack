<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HackTrack</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 420px;
        font-family: Inter, Segoe UI, system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at 8% 8%, rgba(99, 102, 241, 0.2), transparent 35%),
          radial-gradient(circle at 92% 0%, rgba(192, 132, 252, 0.2), transparent 36%),
          #050816;
        color: #e5e7eb;
      }

      .shell {
        padding: 12px;
      }

      .panel {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.68);
        backdrop-filter: blur(14px);
        box-shadow: 0 16px 38px rgba(2, 6, 23, 0.45);
        padding: 12px;
      }

      .header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 8px;
      }

      .title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .subtitle {
        margin: 3px 0 0;
        font-size: 11px;
        color: #9ca3af;
      }

      .countdown-chip {
        border: 1px solid rgba(129, 140, 248, 0.45);
        background: rgba(99, 102, 241, 0.16);
        color: #dbeafe;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        padding: 5px 10px;
        white-space: nowrap;
      }

      .quick-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        margin-top: 10px;
      }

      .quick-input {
        width: 100%;
        border: 1px solid rgba(75, 85, 99, 0.95);
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.85);
        color: #f3f4f6;
        font-size: 12px;
        padding: 10px 12px;
        outline: none;
        transition: border-color 0.16s ease, box-shadow 0.16s ease;
      }

      .quick-input:focus {
        border-color: rgba(129, 140, 248, 0.9);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.22);
      }

      .add-button {
        border: 0;
        border-radius: 12px;
        background: linear-gradient(120deg, #6366f1, #8b5cf6);
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        padding: 0 14px;
        cursor: pointer;
        transition: transform 0.14s ease, filter 0.14s ease;
      }

      .add-button:hover,
      .action-button:hover,
      .hack-item:hover {
        transform: scale(1.012);
      }

      .add-button:active,
      .action-button:active {
        transform: scale(0.99);
      }

      .section {
        margin-top: 10px;
      }

      .section-title {
        margin: 0 0 6px;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #94a3b8;
      }

      .next-card {
        border: 1px solid rgba(129, 140, 248, 0.48);
        border-radius: 12px;
        background: linear-gradient(140deg, rgba(79, 70, 229, 0.24), rgba(30, 41, 59, 0.45));
        padding: 10px;
        min-height: 64px;
        transition: border-color 0.16s ease, transform 0.16s ease;
      }

      .next-card:hover {
        border-color: rgba(129, 140, 248, 0.8);
      }

      .next-name {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        color: #eef2ff;
      }

      .next-meta {
        margin: 5px 0 0;
        font-size: 11px;
        color: #c7d2fe;
      }

      .empty-note {
        margin: 0;
        font-size: 11px;
        color: #94a3b8;
      }

      .list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .hack-item {
        border: 1px solid rgba(71, 85, 105, 0.75);
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.82);
        padding: 8px 10px;
        transition: border-color 0.14s ease, transform 0.14s ease;
      }

      .hack-item:hover {
        border-color: rgba(148, 163, 184, 0.85);
      }

      .hack-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .hack-name {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        color: #f8fafc;
      }

      .hack-time {
        margin: 3px 0 0;
        font-size: 11px;
        color: #94a3b8;
      }

      .status {
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 10px;
        font-weight: 700;
        white-space: nowrap;
      }

      .status-upcoming {
        border: 1px solid rgba(52, 211, 153, 0.44);
        color: #6ee7b7;
        background: rgba(16, 185, 129, 0.14);
      }

      .status-urgent {
        border: 1px solid rgba(251, 191, 36, 0.5);
        color: #fde68a;
        background: rgba(245, 158, 11, 0.15);
      }

      .status-missed {
        border: 1px solid rgba(248, 113, 113, 0.44);
        color: #fecaca;
        background: rgba(239, 68, 68, 0.16);
      }

      .item-actions {
        display: none;
        gap: 6px;
        margin-top: 6px;
      }

      .hack-item[data-expanded="true"] .item-actions {
        display: flex;
      }

      .item-action {
        border: 1px solid rgba(75, 85, 99, 0.9);
        border-radius: 8px;
        background: rgba(17, 24, 39, 0.86);
        color: #e5e7eb;
        font-size: 10px;
        font-weight: 600;
        padding: 4px 8px;
        cursor: pointer;
      }

      .actions-row {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }

      .action-button {
        border: 1px solid rgba(75, 85, 99, 0.9);
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.8);
        color: #e5e7eb;
        font-size: 11px;
        font-weight: 600;
        padding: 8px;
        cursor: pointer;
        transition: transform 0.14s ease, border-color 0.14s ease;
      }

      .action-button:hover {
        border-color: rgba(129, 140, 248, 0.75);
      }

      .toast-stack {
        position: fixed;
        right: 10px;
        bottom: 10px;
        z-index: 20;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .toast {
        border: 1px solid rgba(75, 85, 99, 0.95);
        border-radius: 9px;
        background: rgba(2, 6, 23, 0.95);
        color: #e5e7eb;
        font-size: 11px;
        padding: 7px 9px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="header">
          <div>
            <h1 class="title">HackTrack</h1>
            <p class="subtitle">Minimal hackathon command center</p>
          </div>
          <span id="header-countdown" class="countdown-chip">No upcoming</span>
        </header>

        <form id="quick-add-form" class="quick-row">
          <input
            id="quick-input"
            class="quick-input"
            type="text"
            required
            placeholder="Paste hackathon URL or type name (optional YYYY-MM-DD)"
          />
          <button id="quick-add-btn" class="add-button" type="submit">Add</button>
        </form>

        <section class="section">
          <h2 class="section-title">Next Hackathon</h2>
          <article id="next-card" class="next-card">
            <p class="empty-note">No upcoming hackathon yet.</p>
          </article>
        </section>

        <section class="section">
          <h2 class="section-title">Recent</h2>
          <ul id="recent-list" class="list"></ul>
          <p id="recent-empty" class="empty-note" style="display: none; margin-top: 6px;">
            Nothing saved yet. Add your first hackathon above.
          </p>
        </section>

        <div class="actions-row">
          <button id="action-add" class="action-button" type="button">Add</button>
          <button id="action-dashboard" class="action-button" type="button">Open Dashboard</button>
          <button id="action-settings" class="action-button" type="button">Settings</button>
        </div>
      </section>
    </main>

    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

    <script src="popup.js"></script>
  </body>
</html>
