<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HackTrack</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
    />
    <style>
      :root {
        color-scheme: dark;
      }

      .glass {
        background: rgba(17, 24, 39, 0.64);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
      }

      .soft-glow {
        box-shadow: 0 10px 30px rgba(79, 70, 229, 0.18);
      }

      .pulse-chip {
        transition: all 0.3s ease;
      }

      .dashboard-scroll {
        max-height: 540px;
        overflow: auto;
      }

      .dashboard-scroll::-webkit-scrollbar {
        width: 8px;
      }

      .dashboard-scroll::-webkit-scrollbar-thumb {
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.25);
      }

      .ui-input {
        border-color: rgba(75, 85, 99, 1);
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
      }

      .ui-input:focus {
        border-color: rgba(129, 140, 248, 1);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
      }

      .ui-button {
        transition: transform 0.15s ease, filter 0.15s ease;
      }

      .ui-button:hover {
        filter: brightness(1.05);
      }

      .ui-button:active {
        transform: scale(0.98);
      }

      .card-hover {
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
      }

      .card-hover:hover {
        border-color: rgba(129, 140, 248, 0.45);
        box-shadow: 0 8px 22px rgba(79, 70, 229, 0.18);
      }

      .mini-calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 6px;
      }

      .mini-calendar-day {
        height: 30px;
        border-radius: 8px;
        border: 1px solid rgba(75, 85, 99, 0.9);
        background: rgba(17, 24, 39, 0.8);
        font-size: 12px;
        color: rgba(229, 231, 235, 1);
      }

      .mini-calendar-day[data-has-events="true"] {
        border-color: rgba(129, 140, 248, 0.75);
        background: rgba(99, 102, 241, 0.2);
        color: rgba(224, 231, 255, 1);
      }

      .mini-calendar-day[data-selected="true"] {
        border-color: rgba(165, 180, 252, 1);
        background: rgba(79, 70, 229, 0.45);
        color: rgba(255, 255, 255, 1);
      }

      .mini-calendar-empty {
        height: 30px;
      }
    </style>
  </head>
  <body class="bg-gray-950 text-gray-100" style="width: 820px;">
    <main class="relative overflow-hidden p-4">
      <div class="pointer-events-none absolute -left-10 -top-12 h-44 w-44 rounded-full bg-indigo-500/20 blur-3xl"></div>
      <div class="pointer-events-none absolute right-0 top-4 h-40 w-40 rounded-full bg-fuchsia-500/20 blur-3xl"></div>

      <header class="glass soft-glow relative z-10 rounded-2xl p-5">
        <div class="flex items-start justify-between gap-4">
          <div>
            <h1 class="text-2xl font-semibold tracking-tight text-white">HackTrack Dashboard</h1>
            <p class="mt-1 text-sm text-gray-200">Never miss a hackathon again</p>
          </div>
          <div class="grid grid-cols-2 gap-2 text-right">
            <div class="rounded-xl border border-gray-700 bg-gray-900/70 px-3 py-2">
              <p class="text-[11px] uppercase tracking-widest text-gray-400">Total</p>
              <p id="metric-total" class="text-lg font-semibold">0</p>
            </div>
            <div class="rounded-xl border border-gray-700 bg-gray-900/70 px-3 py-2">
              <p class="text-[11px] uppercase tracking-widest text-gray-400">Upcoming</p>
              <p id="metric-upcoming" class="text-lg font-semibold">0</p>
            </div>
          </div>
        </div>

        <form id="hackathon-form" class="mt-5 grid grid-cols-12 gap-2">
          <input
            id="name"
            name="name"
            type="text"
            required
            placeholder="Hackathon Name"
            class="ui-input col-span-5 rounded-xl border bg-gray-900/80 px-3 py-2 text-sm text-white placeholder-gray-400 focus:outline-none"
          />
          <input
            id="deadline"
            name="deadline"
            type="date"
            class="ui-input col-span-3 rounded-xl border bg-gray-900/80 px-3 py-2 text-sm text-white focus:outline-none"
          />
          <input
            id="prize"
            name="prize"
            type="text"
            placeholder="Prize (optional)"
            class="ui-input col-span-2 rounded-xl border bg-gray-900/80 px-3 py-2 text-sm text-white placeholder-gray-400 focus:outline-none"
          />
          <button
            type="submit"
            class="ui-button col-span-2 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 px-3 py-2 text-sm font-semibold text-white"
          >
            Save
          </button>
        </form>
      </header>

      <section class="relative z-10 mt-5 grid grid-cols-12 gap-4">
        <div class="col-span-8 rounded-2xl border border-gray-800 bg-gray-900/70 p-3">
          <div class="mb-4 flex items-center justify-between gap-2">
            <div id="filter-group" class="flex items-center gap-2">
              <button type="button" data-filter="all" class="filter-chip ui-button pulse-chip rounded-full border border-indigo-400/40 bg-indigo-500/20 px-3 py-1 text-xs font-semibold text-indigo-200">All</button>
              <button type="button" data-filter="registered" class="filter-chip ui-button pulse-chip rounded-full border border-gray-700 bg-gray-800 px-3 py-1 text-xs font-semibold text-gray-200">Registered</button>
              <button type="button" data-filter="not_registered" class="filter-chip ui-button pulse-chip rounded-full border border-gray-700 bg-gray-800 px-3 py-1 text-xs font-semibold text-gray-200">Not Registered</button>
              <button type="button" data-filter="ending_soon" class="filter-chip ui-button pulse-chip rounded-full border border-gray-700 bg-gray-800 px-3 py-1 text-xs font-semibold text-gray-200">Ending Soon</button>
            </div>
            <select id="sort-select" class="ui-input rounded-lg border bg-gray-900 px-2 py-1 text-xs text-gray-100 focus:outline-none">
              <option value="deadline">Sort: Deadline</option>
              <option value="prize">Sort: Prize</option>
              <option value="recent">Sort: Recently Added</option>
            </select>
          </div>

          <ul id="hackathon-list" class="dashboard-scroll space-y-3"></ul>

          <div id="empty-state" class="hidden rounded-2xl border border-dashed border-gray-700 bg-gray-900/60 p-8 text-center">
            <div class="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded-full bg-indigo-500/20 text-2xl">🚀</div>
            <p class="text-base font-semibold text-gray-200">No hackathons saved yet 🚀</p>
            <p class="mt-1 text-sm text-gray-300">Start exploring and save your first hackathon</p>
          </div>
        </div>

        <aside class="col-span-4 space-y-3">
          <div class="glass rounded-2xl p-3">
            <h2 class="text-xs font-semibold uppercase tracking-widest text-gray-400">Insights</h2>
            <div class="mt-3 space-y-2 text-sm">
              <div class="flex items-center justify-between rounded-lg bg-gray-900/70 px-3 py-2">
                <span class="text-gray-400">Total saved</span><span id="insight-total" class="font-semibold text-gray-100">0</span>
              </div>
              <div class="flex items-center justify-between rounded-lg bg-gray-900/70 px-3 py-2">
                <span class="text-gray-400">Upcoming (3d)</span><span id="insight-upcoming" class="font-semibold text-gray-100">0</span>
              </div>
              <div class="flex items-center justify-between rounded-lg bg-gray-900/70 px-3 py-2">
                <span class="text-gray-400">Avg time left</span><span id="insight-avg" class="font-semibold text-gray-100">0h</span>
              </div>
            </div>
          </div>

          <div class="glass rounded-2xl p-3">
            <div class="flex items-center justify-between">
              <h3 class="text-xs font-semibold uppercase tracking-widest text-gray-400">Calendar</h3>
              <span id="calendar-month-label" class="text-xs text-gray-300">-</span>
            </div>
            <div id="calendar-weekdays" class="mini-calendar-grid mt-3 text-center text-[10px] font-semibold uppercase tracking-wide text-gray-400">
              <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
            </div>
            <div id="mini-calendar-grid" class="mini-calendar-grid mt-2"></div>
            <div class="mt-3 rounded-lg bg-gray-900/70 p-2">
              <p id="calendar-selected-label" class="text-xs text-gray-300">Select a date</p>
              <ul id="calendar-day-list" class="mt-2 space-y-1 text-xs text-gray-200"></ul>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
